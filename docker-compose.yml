# ============================================================
# UzASBO 2.0 AI Assistant — Docker Compose (Windows)
#
# Ishga tushirish:  docker-compose up -d
# To'xtatish:       docker-compose down
# Loglar:           docker-compose logs -f
# ============================================================

services:

  # --- OLLAMA: Mahalliy LLM server ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # --- OLLAMA MODEL YUKLOVCHI ---
  # Ollama tayyor bo'lgach, kerakli modellarni avtomatik yuklaydi
  # Bu konteyner ishini tugatgach o'zi to'xtaydi
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    # 1) Ollama server tayyor bo'lishini kutish (30 sek)
    # 2) llama3.1:8b modelni yuklash (~4.7 GB, birinchi marta)
    # 3) nomic-embed-text modelni yuklash (~274 MB, birinchi marta)
    entrypoint: >
      sh -c "
        echo '⏳ Ollama server kutilmoqda...' &&
        sleep 15 &&
        echo '📥 llama3.1:8b yuklanmoqda...' &&
        ollama pull llama3.1:8b &&
        echo '📥 nomic-embed-text yuklanmoqda...' &&
        ollama pull nomic-embed-text &&
        echo '✅ Barcha modellar yuklandi!'
      "
    restart: "no"

  # --- CHROMADB: Vektorli ma'lumotlar bazasi ---
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - IS_PERSISTENT=TRUE
    restart: unless-stopped

  # --- REDIS: Chat tarix va kesh ---
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # --- AI-SERVICE: FastAPI backend ---
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uzasbo2-ai-assistant
    ports:
      - "8100:8100"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=uzasbo2_knowledge
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - APP_PORT=8100
      - APP_DEBUG=False
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
      - RAG_TOP_K=5
      - RAG_TEMPERATURE=0.2
      - RAG_CHUNK_SIZE=800
      - RAG_CHUNK_OVERLAP=200
    depends_on:
      - ollama
      - chromadb
      - redis
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  redis_data:
